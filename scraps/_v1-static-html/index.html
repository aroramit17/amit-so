  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --bg2: #161616;
      --cream: #e8e0d4;
      --cream-dim: rgba(232, 224, 212, 0.55);
      --accent: #d4725c;
      --accent2: #c9965c;
      --rule: rgba(232, 224, 212, 0.1);
      --card-bg: rgba(232, 224, 212, 0.04);
      --card-border: rgba(232, 224, 212, 0.08);
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'Sora', sans-serif;
    }

    html { scroll-behavior: smooth; scroll-padding-top: 80px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--cream);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .grain {
      position: fixed; inset: 0; z-index: 9999; pointer-events: none;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* ─── Nav ─── */
    .site-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.25rem 3rem;
      transition: all 0.4s;
    }
    .site-nav.scrolled {
      background: rgba(14, 14, 14, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--rule);
      padding: 0.9rem 3rem;
    }
    .nav-brand {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-style: italic;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .nav-links {
      display: flex; align-items: center; gap: 2.25rem;
    }
    .nav-links a {
      color: var(--cream-dim);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--cream); }
    .nav-cta {
      background: var(--accent) !important;
      color: var(--bg) !important;
      padding: 0.55rem 1.2rem;
      border-radius: 6px;
      font-weight: 600 !important;
      text-transform: uppercase !important;
      font-size: 0.78rem !important;
      letter-spacing: 0.5px;
      transition: transform 0.3s, box-shadow 0.3s !important;
    }
    .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(212, 114, 92, 0.3); }
    .nav-hamburger {
      display: none; background: none; border: none; cursor: pointer;
      flex-direction: column; gap: 5px; padding: 4px;
    }
    .nav-hamburger span {
      display: block; width: 22px; height: 1.5px; background: var(--cream); transition: all 0.3s;
    }
    .nav-hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(4.5px, 4.5px); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(4.5px, -4.5px); }

    /* ─── Section primitives ─── */
    section {
      max-width: 1080px;
      margin: 0 auto;
      padding: 7rem 2rem;
    }
    .label {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    .section-heading {
      font-family: var(--serif);
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 400;
      line-height: 1.15;
      margin-bottom: 2.5rem;
      color: var(--cream);
    }

    /* ─── Buttons ─── */
    .btn-filled {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.9rem 2rem;
      background: var(--accent);
      color: var(--bg);
      border-radius: 8px;
      font-family: var(--sans);
      font-weight: 600;
      font-size: 0.88rem;
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: transform 0.3s, box-shadow 0.3s;
      border: none; cursor: pointer;
    }
    .btn-filled:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(212, 114, 92, 0.25); }
    .btn-outline {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.9rem 2rem;
      background: transparent;
      color: var(--cream);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      font-family: var(--sans);
      font-weight: 500;
      font-size: 0.88rem;
      text-decoration: none;
      transition: all 0.3s;
      cursor: pointer;
    }
    .btn-outline:hover { border-color: var(--cream-dim); background: var(--card-bg); }

    /* ─── Hero ─── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      padding-top: 100px;
    }
    .hero-inner { max-width: 720px; }
    .hero-badge {
      display: inline-block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      font-weight: 600;
      padding: 0.45rem 1rem;
      border: 1px solid rgba(212, 114, 92, 0.3);
      border-radius: 999px;
      margin-bottom: 2rem;
    }
    .hero-badge::before {
      content: '';
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 0.6rem;
      vertical-align: middle;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .hero-name {
      font-family: var(--serif);
      font-size: clamp(3.5rem, 9vw, 7rem);
      font-weight: 400;
      line-height: 0.95;
      margin-bottom: 1.5rem;
      letter-spacing: -2px;
    }
    .hero-tagline {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--cream-dim);
      font-weight: 300;
      margin-bottom: 0.75rem;
      max-width: 600px;
    }
    .hero-sub {
      font-size: 0.92rem;
      color: rgba(232, 224, 212, 0.35);
      font-style: italic;
      font-family: var(--serif);
      max-width: 560px;
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }
    .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .hero-scroll-hint {
      position: absolute;
      bottom: 3rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    }
    .hero-scroll-hint span {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--cream-dim);
    }
    .scroll-line {
      width: 1px; height: 48px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse { 0%,100% { opacity: 1; height: 48px; } 50% { opacity: 0.4; height: 32px; } }

    /* ─── About ─── */
    .about-section { border-top: 1px solid var(--rule); }
    .about-inner {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 4rem;
      align-items: start;
    }
    .about-text p {
      color: var(--cream-dim);
      font-size: 0.95rem;
      margin-bottom: 1.25rem;
      line-height: 1.7;
    }
    .about-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .stat-card {
      padding: 1.75rem;
      border: 1px solid var(--card-border);
      border-radius: 12px;
      background: var(--card-bg);
      transition: border-color 0.3s, transform 0.3s;
    }
    .stat-card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .stat-num {
      font-family: var(--serif);
      font-size: 2.2rem;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 0.4rem;
    }
    .stat-label {
      font-size: 0.78rem;
      color: var(--cream-dim);
      letter-spacing: 0.3px;
    }

    /* ─── Experience ─── */
    .experience-section { border-top: 1px solid var(--rule); }
    .exp-timeline {
      position: relative;
      padding-left: 2.5rem;
    }
    .exp-timeline::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, var(--accent), var(--rule));
    }
    .exp-card {
      position: relative;
      padding: 2rem;
      border: 1px solid var(--card-border);
      border-radius: 14px;
      background: var(--card-bg);
      margin-bottom: 1.5rem;
      transition: border-color 0.3s;
    }
    .exp-card:hover { border-color: color-mix(in oklch, var(--accent), transparent 50%); }
    .exp-dot {
      position: absolute;
      left: -2.5rem;
      top: 2.5rem;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      transform: translateX(calc(-50% + 0.5px));
    }
    .exp-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .exp-company {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-weight: 400;
    }
    .exp-role {
      display: block;
      font-size: 0.82rem;
      color: var(--accent);
      font-weight: 500;
      margin-top: 0.15rem;
    }
    .exp-dates {
      font-size: 0.78rem;
      color: var(--cream-dim);
      font-weight: 500;
      white-space: nowrap;
    }
    .exp-summary {
      font-size: 0.9rem;
      color: var(--cream-dim);
      line-height: 1.65;
      margin-bottom: 0.75rem;
    }
    .exp-toggle {
      background: none; border: none;
      color: var(--accent);
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center; gap: 0.4rem;
      transition: color 0.3s;
    }
    .exp-toggle:hover { color: var(--accent2); }
    .exp-arrow { transition: transform 0.3s; display: inline-block; }
    .exp-arrow.up { transform: rotate(180deg); }
    .exp-details {
      margin-top: 1.25rem;
      border-top: 1px solid var(--rule);
      padding-top: 1rem;
    }
    .exp-category { margin-bottom: 0.75rem; }
    .exp-cat-btn {
      background: none; border: none;
      color: var(--cream);
      font-family: var(--sans);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center; gap: 0.5rem;
      padding: 0.5rem 0;
      width: 100%;
      text-align: left;
      transition: color 0.3s;
    }
    .exp-cat-btn:hover { color: var(--accent); }
    .exp-cat-arrow {
      display: inline-block;
      transition: transform 0.3s;
      color: var(--accent);
      font-size: 0.9rem;
    }
    .exp-cat-arrow.open { transform: rotate(90deg); }
    .exp-cat-items {
      list-style: none;
      padding-left: 1.25rem;
      border-left: 1px solid var(--rule);
      margin-left: 0.35rem;
      margin-top: 0.25rem;
    }
    .exp-cat-items li {
      position: relative;
      padding-left: 1rem;
      margin-bottom: 0.6rem;
      font-size: 0.85rem;
      color: var(--cream-dim);
      line-height: 1.6;
    }
    .exp-cat-items li::before {
      content: '';
      position: absolute;
      left: 0; top: 0.55rem;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.5;
    }

    /* ─── Skills ─── */
    .skills-section { border-top: 1px solid var(--rule); }
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }
    .skill-card {
      padding: 2rem;
      border: 1px solid var(--card-border);
      border-radius: 14px;
      background: var(--card-bg);
      transition: all 0.3s;
    }
    .skill-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }
    .skill-card h3 {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 400;
      margin-bottom: 0.6rem;
    }
    .skill-card p {
      font-size: 0.85rem;
      color: var(--cream-dim);
      line-height: 1.6;
      margin-bottom: 1rem;
    }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .skill-tag {
      font-size: 0.7rem;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      background: rgba(212, 114, 92, 0.1);
      color: var(--accent);
      border: 1px solid rgba(212, 114, 92, 0.15);
      letter-spacing: 0.3px;
    }

    /* ─── Certs ─── */
    .certs-section { border-top: 1px solid var(--rule); }
    .certs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 0.75rem;
    }
    .cert-chip {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 1rem 1.25rem;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      background: var(--card-bg);
      transition: all 0.3s;
    }
    .cert-chip:hover { border-color: var(--accent); transform: translateY(-2px); }
    .cert-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--bg);
      flex-shrink: 0;
    }
    .cert-chip span {
      font-size: 0.82rem;
      font-weight: 500;
      line-height: 1.3;
    }

    /* ─── Milestones ─── */
    .milestones-section { border-top: 1px solid var(--rule); }
    .ms-header-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem;
    }
    .ms-nav-arrows {
      display: flex; align-items: center; gap: 0.75rem;
    }
    .ms-arrow-btn {
      background: var(--card-bg); border: 1px solid var(--card-border);
      color: var(--cream); width: 36px; height: 36px;
      border-radius: 50%; cursor: pointer;
      font-size: 1rem; display: flex; align-items: center; justify-content: center;
      transition: all 0.3s; font-family: var(--sans);
    }
    .ms-arrow-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(212,114,92,0.1); }
    .ms-arrow-btn:disabled { opacity: 0.25; cursor: default; }
    .ms-counter {
      font-size: 0.75rem; color: var(--cream-dim); font-weight: 500;
      min-width: 80px; text-align: center;
    }

    .ms-scroll-wrap {
      overflow-x: auto; overflow-y: visible;
      margin: 0 -2rem; padding: 0 2rem 1.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--card-border) transparent;
    }
    .ms-scroll-wrap::-webkit-scrollbar { height: 4px; }
    .ms-scroll-wrap::-webkit-scrollbar-track { background: transparent; }
    .ms-scroll-wrap::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 2px; }

    .ms-timeline-track {
      display: flex; gap: 0; min-width: max-content;
      position: relative;
      padding-bottom: 0.5rem;
    }

    .ms-tile {
      position: relative;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 1.25rem 1.1rem 1rem;
      cursor: pointer;
      text-align: left;
      font-family: var(--sans);
      color: var(--cream);
      transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      width: 155px;
      flex-shrink: 0;
      margin-right: 0;
    }
    .ms-tile:hover {
      border-color: var(--co);
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.35);
      z-index: 2;
    }
    .ms-tile.active {
      border-color: var(--co);
      background: color-mix(in oklch, var(--co), transparent 92%);
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.35), 0 0 0 1px var(--co);
      z-index: 2;
    }
    .ms-tile.past { opacity: 0.55; }
    .ms-tile.past:hover { opacity: 1; }

    .ms-tile-line {
      display: flex; align-items: center;
      margin-bottom: 0.4rem;
      position: relative;
      height: 12px;
    }
    .ms-tile-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--co);
      flex-shrink: 0;
      transition: all 0.3s;
      box-shadow: 0 0 0 0 var(--co);
    }
    .ms-tile.active .ms-tile-dot {
      box-shadow: 0 0 0 4px color-mix(in oklch, var(--co), transparent 70%);
    }
    .ms-tile-connector {
      position: absolute;
      left: 14px; right: -4px;
      top: 50%; height: 2px;
      background: var(--card-border);
      transition: background 0.5s;
    }
    .ms-tile-connector.filled { background: var(--co); }
    .ms-tile:last-child .ms-tile-connector { display: none; }

    .ms-tile-year {
      font-size: 0.68rem; font-weight: 700;
      color: var(--co); letter-spacing: 0.5px;
    }
    .ms-tile-title {
      font-size: 0.82rem; font-weight: 600; line-height: 1.25;
    }
    .ms-tile-co {
      font-size: 0.65rem; color: var(--cream-dim);
      margin-top: 0.15rem; letter-spacing: 0.3px;
    }
    .ms-tile-preview {
      position: absolute;
      bottom: -28px; left: 50%; transform: translateX(-50%);
      font-size: 0.65rem; color: var(--accent);
      white-space: nowrap; font-weight: 600;
      animation: fadeUp 0.2s ease;
    }

    /* Detail panel */
    .ms-detail-panel {
      max-height: 0; overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s, margin 0.3s;
      opacity: 0; margin-bottom: 0;
      border-radius: 14px;
    }
    .ms-detail-panel.open {
      max-height: 400px; opacity: 1;
      margin-bottom: 1.5rem; margin-top: 0.5rem;
      padding: 2rem;
      border: 1px solid color-mix(in oklch, var(--co), transparent 60%);
      background: var(--card-bg);
    }
    .ms-detail-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 0.75rem;
    }
    .ms-detail-h {
      font-family: var(--serif); font-size: 1.35rem; font-weight: 400; margin-bottom: 0.2rem;
    }
    .ms-detail-role {
      font-size: 0.85rem; color: var(--co); font-weight: 500; display: block;
    }
    .ms-detail-close {
      background: none; border: none; color: var(--cream-dim);
      cursor: pointer; font-size: 1rem; padding: 0.25rem;
      transition: color 0.3s;
    }
    .ms-detail-close:hover { color: var(--cream); }
    .ms-detail-desc {
      font-size: 0.9rem; color: var(--cream-dim); line-height: 1.65;
    }
    .ms-detail-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.75rem; }
    .ms-dtag {
      font-size: 0.72rem; padding: 0.25rem 0.6rem;
      border-radius: 999px;
      background: color-mix(in oklch, var(--co), transparent 85%);
      color: var(--co);
      border: 1px solid color-mix(in oklch, var(--co), transparent 70%);
    }
    .ms-detail-nav {
      display: flex; gap: 0.75rem; margin-top: 1.25rem;
      padding-top: 1rem; border-top: 1px solid var(--rule);
    }
    .ms-detail-nav-btn {
      background: none; border: 1px solid var(--card-border);
      color: var(--cream-dim); padding: 0.45rem 1rem;
      border-radius: 6px; font-family: var(--sans);
      font-size: 0.78rem; font-weight: 500; cursor: pointer;
      transition: all 0.3s;
    }
    .ms-detail-nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--cream); }
    .ms-detail-nav-btn:disabled { opacity: 0.25; cursor: default; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .ms-legend {
      display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center;
    }
    .ms-legend-item {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.72rem; color: var(--cream-dim);
      background: none; border: 1px solid transparent;
      border-radius: 999px; padding: 0.35rem 0.75rem;
      cursor: pointer; font-family: var(--sans);
      transition: all 0.3s;
    }
    .ms-legend-item:hover { border-color: var(--card-border); }
    .ms-legend-item.active { border-color: var(--cream-dim); color: var(--cream); }
    .ms-legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* ─── Iridescent Milestone Cards ─── */
    .irid-filters {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .irid-filter-btn {
      display: flex; align-items: center; gap: 0.4rem;
      background: var(--card-bg); border: 1px solid var(--card-border);
      color: var(--cream-dim); padding: 0.45rem 0.9rem;
      border-radius: 999px; cursor: pointer;
      font-family: var(--sans); font-size: 0.75rem; font-weight: 500;
      transition: all 0.3s;
    }
    .irid-filter-btn:hover { border-color: var(--cream-dim); color: var(--cream); }
    .irid-filter-btn.active { border-color: var(--co, var(--accent)); color: var(--cream); background: color-mix(in oklch, var(--co, var(--accent)), transparent 88%); }
    .irid-filter-dot { width: 7px; height: 7px; border-radius: 50%; }

    .irid-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .irid-card-wrap {
      perspective: 800px;
    }

    .irid-card {
      position: relative;
      border-radius: 16px;
      background: linear-gradient(145deg, #1a1a1a 0%, #111 100%);
      border: 1px solid var(--card-border);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.03, 0.98, 0.52, 0.99), box-shadow 0.4s;
      transform-style: preserve-3d;
      will-change: transform;
      min-height: 240px;
    }
    .irid-card:hover {
      border-color: color-mix(in oklch, var(--co), transparent 40%);
    }
    .irid-card.active {
      border-color: var(--co);
    }

    .irid-sheen {
      position: absolute; inset: 0; z-index: 1;
      pointer-events: none;
      border-radius: 16px;
      transition: opacity 0.5s;
      mix-blend-mode: color-dodge;
    }

    .irid-specular {
      position: absolute; inset: 0; z-index: 2;
      pointer-events: none;
      border-radius: 16px;
      transition: background 0.15s;
    }

    .irid-noise {
      position: absolute; inset: 0; z-index: 3;
      pointer-events: none;
      border-radius: 16px;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    .irid-edge-glow {
      position: absolute; inset: 0; z-index: 0;
      border-radius: 16px;
      pointer-events: none;
      transition: box-shadow 0.4s;
    }

    .irid-content {
      position: relative; z-index: 4;
      padding: 1.5rem;
      display: flex; flex-direction: column;
      height: 100%;
    }

    .irid-top-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem;
    }
    .irid-index {
      font-family: var(--serif);
      font-size: 0.85rem;
      color: rgba(232,224,212,0.25);
      font-style: italic;
    }
    .irid-co-badge {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
      color: var(--co);
      background: color-mix(in oklch, var(--co), transparent 85%);
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      border: 1px solid color-mix(in oklch, var(--co), transparent 70%);
    }

    .irid-dot-row {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .irid-dot {
      width: 8px; height: 8px; border-radius: 50%;
      box-shadow: 0 0 8px currentColor;
    }
    .irid-year {
      font-size: 0.72rem; font-weight: 700;
      color: var(--co);
      letter-spacing: 0.5px;
    }

    .irid-title {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-weight: 400;
      margin-bottom: 0.6rem;
      line-height: 1.25;
    }

    .irid-desc {
      font-size: 0.82rem;
      color: var(--cream-dim);
      line-height: 1.6;
      flex: 1;
    }

    .irid-tags {
      display: flex; flex-wrap: wrap; gap: 0.35rem;
      margin-top: 1rem;
    }
    .irid-tag {
      font-size: 0.65rem;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      background: color-mix(in oklch, var(--co), transparent 88%);
      color: var(--co);
      border: 1px solid color-mix(in oklch, var(--co), transparent 75%);
      letter-spacing: 0.3px;
    }

    @media (max-width: 768px) {
      .irid-grid { grid-template-columns: 1fr; }
    }

    /* ─── Projects ─── */
    .projects-section { border-top: 1px solid var(--rule); }
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.25rem;
    }
    .project-card {
      padding: 2rem;
      border: 1px solid var(--card-border);
      border-radius: 14px;
      background: var(--card-bg);
      text-decoration: none;
      color: var(--cream);
      display: flex;
      flex-direction: column;
      transition: all 0.3s;
      position: relative;
    }
    .project-card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .project-type {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .project-card h3 {
      font-family: var(--serif);
      font-size: 1.25rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
    }
    .project-card p {
      font-size: 0.85rem;
      color: var(--cream-dim);
      line-height: 1.6;
      flex: 1;
    }
    .project-arrow {
      position: absolute;
      top: 1.5rem; right: 1.5rem;
      font-size: 1.2rem;
      color: var(--cream-dim);
      transition: all 0.3s;
    }
    .project-card:hover .project-arrow { color: var(--accent); transform: translate(3px, -3px); }

    /* ─── Contact ─── */
    .contact-section {
      border-top: 1px solid var(--rule);
      text-align: center;
    }
    .contact-sub {
      font-size: 0.95rem;
      color: var(--cream-dim);
      max-width: 560px;
      margin: 0 auto 2rem;
      line-height: 1.7;
    }
    .contact-links {
      display: flex; justify-content: center; gap: 0.75rem; flex-wrap: wrap;
    }
    .contact-chip {
      display: inline-flex; align-items: center;
      padding: 0.7rem 1.25rem;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: var(--card-bg);
      color: var(--cream);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      transition: all 0.3s;
    }
    .contact-chip:hover { border-color: var(--accent); transform: translateY(-2px); }

    /* ─── Footer ─── */
    .site-footer {
      text-align: center;
      padding: 2.5rem;
      font-size: 0.75rem;
      color: rgba(232, 224, 212, 0.25);
      border-top: 1px solid var(--rule);
    }
    .footer-sep { color: rgba(232, 224, 212, 0.2); }
    .footer-link {
      color: rgba(232, 224, 212, 0.45);
      text-decoration: none;
      transition: color 0.3s;
      font-family: var(--sans);
    }
    .footer-link:hover { color: var(--accent); }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .site-nav { padding: 1rem 1.5rem; }
      .site-nav.scrolled { padding: 0.75rem 1.5rem; }
      .nav-links {
        display: none;
        position: absolute; top: 100%; left: 0; right: 0;
        flex-direction: column;
        background: rgba(14, 14, 14, 0.95);
        backdrop-filter: blur(16px);
        padding: 1.5rem 2rem;
        gap: 1rem;
        border-bottom: 1px solid var(--rule);
      }
      .nav-links.open { display: flex; }
      .nav-hamburger { display: flex; }
      section { padding: 4.5rem 1.25rem; }
      .about-inner { grid-template-columns: 1fr; gap: 2.5rem; }
      .skills-grid { grid-template-columns: 1fr; }
      .projects-grid { grid-template-columns: 1fr; }
      .hero-name { letter-spacing: -1px; }
      .ms-track { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }

    /* ─── Tweaks panel ─── */
    .tweaks-panel {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 200;
      background: #1a1a1a;
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 1.25rem;
      width: 240px;
      font-family: var(--sans);
      box-shadow: 0 12px 48px rgba(0,0,0,0.5);
    }
    .tweaks-panel h4 {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .tweak-row {
      margin-bottom: 0.85rem;
    }
    .tweak-label {
      font-size: 0.72rem;
      color: var(--cream-dim);
      margin-bottom: 0.3rem;
      display: block;
    }
    .tweak-row select, .tweak-row input[type=color] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--card-border);
      color: var(--cream);
      font-family: var(--sans);
      font-size: 0.78rem;
      padding: 0.4rem 0.5rem;
      border-radius: 6px;
      cursor: pointer;
    }
    .tweak-row input[type=color] {
      height: 32px; padding: 2px;
    }
  </style>
  <script src="consent.js" defer></script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="milestones.jsx"></script>
</body>
</html>
